<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lens Scanner Pro - 严格按文件名排序</title>
    <link rel="manifest" href="./manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.0.2/dist/tesseract.min.js"></script>
    <style>
        /* 完整样式（与原版相同，此处略... 实际使用时会包含所有样式） */
        /* 为保证可读性，以下只展示关键新增样式，完整版请使用之前提供的样式 */
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        body{font-family:'Inter',sans-serif;background:#000;overflow:hidden;}
        .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(100px);background:rgba(0,0,0,0.9);color:#fff;padding:12px 24px;border-radius:25px;z-index:200;opacity:0;transition:all 0.3s;}
        .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
        .processing-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:100;display:none;flex-direction:column;align-items:center;justify-content:center;color:#fff;}
        .processing-overlay.active{display:flex;}
        .spinner{width:50px;height:50px;border:3px solid #333;border-top-color:#0f0;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:20px;}
        @keyframes spin{to{transform:rotate(360deg);}}
        /* 其他样式请复制之前完整版 */
    </style>
</head>
<body>
    <!-- 相机界面（简略，实际使用完整版） -->
    <div class="camera-container" id="cameraContainer">
        <video id="video" autoplay playsinline muted></video>
        <div class="shutter-btn" onclick="capture()"><div class="shutter-inner"></div></div>
        <label class="upload-btn" for="fileInput">📷</label>
        <input type="file" id="fileInput" accept="image/*" multiple onchange="handleFileUpload(event)">
        <div class="gallery-btn" onclick="openGallery()">📁<div class="gallery-count" id="galleryCount" style="display:none;">0</div></div>
    </div>
    <!-- 相册模态框 -->
    <div class="gallery-modal" id="galleryModal">
        <div class="preview-header"><button onclick="closeGallery()">关闭</button><span>相册 (<span id="galleryTotal">0</span>)</span><button onclick="toggleSelectAll()">全选</button></div>
        <div class="gallery-grid" id="galleryGrid"></div>
        <div class="dpi-selector" style="display:flex; justify-content:space-between; padding:12px;">
            <span>DPI:</span>
            <div><button class="dpi-btn" data-dpi="150">150</button><button class="dpi-btn" data-dpi="200">200</button><button class="dpi-btn active" data-dpi="300">300</button></div>
            <button onclick="sortGalleryByFileName()" style="background:#2a2a2a; border:none; color:#0f0; padding:6px 12px; border-radius:20px;">📁 按文件名排序</button>
        </div>
        <div class="gallery-actions">
            <button onclick="deleteSelected()">删除选中</button>
            <button onclick="exportPDF()">导出 PDF</button>
        </div>
    </div>

    <script>
        // ======================== 全局变量 ========================
        let capturedImages = [];      // 每项 { id, data, fileName, timestamp }
        let selectedOrder = [];
        let currentDPI = 300;
        
        function showToast(msg) {
            let toast = document.getElementById('toast');
            if (!toast) { toast = document.createElement('div'); toast.id='toast'; toast.className='toast'; document.body.appendChild(toast); }
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(()=>toast.classList.remove('show'),2500);
        }
        
        // 上传图片
        function handleFileUpload(event) {
            const files = Array.from(event.target.files);
            const imageFiles = files.filter(f=>f.type.startsWith('image/'));
            if(imageFiles.length===0) return;
            for(let file of imageFiles){
                const reader = new FileReader();
                reader.onload = e => {
                    capturedImages.push({
                        id: Date.now() + Math.random(),
                        data: e.target.result,
                        fileName: file.name,
                        timestamp: new Date().toLocaleString()
                    });
                    updateGalleryCount();
                };
                reader.readAsDataURL(file);
            }
            event.target.value = '';
            showToast(`已添加 ${imageFiles.length} 张图片`);
        }
        
        function capture() { showToast('相机功能请使用完整版'); }
        function updateGalleryCount() {
            const countSpan = document.getElementById('galleryCount');
            if(capturedImages.length>0){
                countSpan.textContent = capturedImages.length;
                countSpan.style.display = 'flex';
            } else { countSpan.style.display = 'none'; }
        }
        
        function openGallery() {
            const modal = document.getElementById('galleryModal');
            const grid = document.getElementById('galleryGrid');
            const totalSpan = document.getElementById('galleryTotal');
            grid.innerHTML = '';
            totalSpan.textContent = capturedImages.length;
            capturedImages.forEach((img, idx) => {
                const item = document.createElement('div');
                item.className = 'gallery-item';
                item.innerHTML = `<img src="${img.data}" style="width:100%;height:100%;object-fit:cover;">`;
                item.onclick = (e) => {
                    e.stopPropagation();
                    if(item.classList.contains('selected')){
                        item.classList.remove('selected');
                        selectedOrder = selectedOrder.filter(i=>i!==idx);
                    } else {
                        item.classList.add('selected');
                        selectedOrder.push(idx);
                    }
                };
                grid.appendChild(item);
            });
            modal.classList.add('active');
        }
        
        function closeGallery() { document.getElementById('galleryModal').classList.remove('active'); }
        function toggleSelectAll() { /* 略，完整版有 */ }
        function deleteSelected() { /* 略 */ }
        
        // 按文件名排序相册
        function sortGalleryByFileName() {
            if(capturedImages.length===0){ showToast('没有图片'); return; }
            capturedImages.sort((a,b)=> a.fileName.localeCompare(b.fileName, undefined, { numeric: true, sensitivity: 'base' }));
            selectedOrder = [];
            openGallery();
            showToast('已按文件名排序');
        }
        
        // 导出 PDF（严格按文件名排序，并预览顺序）
        async function exportPDF() {
            if(capturedImages.length===0){ showToast('没有图片'); return; }
            // 复制一份并按文件名排序
            let imagesToExport = [...capturedImages];
            imagesToExport.sort((a,b)=> a.fileName.localeCompare(b.fileName, undefined, { numeric: true, sensitivity: 'base' }));
            
            // 预览排序结果（弹窗确认）
            const fileList = imagesToExport.map((img,i)=> `${i+1}. ${img.fileName}`).join('\n');
            const userConfirm = confirm(`即将按以下文件名顺序导出 PDF，请确认顺序是否正确：\n\n${fileList}\n\n是否继续？`);
            if(!userConfirm) return;
            
            // 显示处理中
            const processing = document.createElement('div');
            processing.className = 'processing-overlay active';
            processing.innerHTML = '<div class="spinner"></div><div>正在生成PDF...</div>';
            document.body.appendChild(processing);
            
            try {
                const { PDFDocument } = PDFLib;
                const pdfDoc = await PDFDocument.create();
                const dpi = currentDPI;
                const inchPerMM = 1/25.4;
                const a4WidthPx = Math.round(210 * inchPerMM * dpi);
                const a4HeightPx = Math.round(297 * inchPerMM * dpi);
                
                for(let i=0; i<imagesToExport.length; i++){
                    const imgData = imagesToExport[i].data;
                    const img = await loadImage(imgData);
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = a4WidthPx;
                    canvas.height = a4HeightPx;
                    ctx.fillStyle = 'white';
                    ctx.fillRect(0,0,a4WidthPx,a4HeightPx);
                    const imgRatio = img.width/img.height;
                    const a4Ratio = a4WidthPx/a4HeightPx;
                    let drawW, drawH, offX, offY;
                    if(imgRatio > a4Ratio){
                        drawW = a4WidthPx;
                        drawH = a4WidthPx / imgRatio;
                        offX = 0;
                        offY = (a4HeightPx - drawH)/2;
                    } else {
                        drawH = a4HeightPx;
                        drawW = a4HeightPx * imgRatio;
                        offX = (a4WidthPx - drawW)/2;
                        offY = 0;
                    }
                    ctx.drawImage(img, offX, offY, drawW, drawH);
                    const jpegData = canvas.toDataURL('image/jpeg',0.85);
                    const jpegImage = await pdfDoc.embedJpg(jpegData.split(',')[1]);
                    const page = pdfDoc.addPage([595.28,841.89]);
                    page.drawImage(jpegImage, { x:0, y:0, width:595.28, height:841.89 });
                }
                const pdfBytes = await pdfDoc.save();
                const blob = new Blob([pdfBytes], {type:'application/pdf'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `扫描文档_${new Date().toLocaleDateString()}.pdf`;
                a.click();
                URL.revokeObjectURL(url);
                showToast('导出成功，已按文件名排序');
            } catch(e){
                console.error(e);
                showToast('导出失败：'+e.message);
            } finally {
                document.body.removeChild(processing);
            }
        }
        
        function loadImage(src){
            return new Promise((resolve,reject)=>{
                const img = new Image();
                img.onload = ()=>resolve(img);
                img.onerror = reject;
                img.src = src;
            });
        }
        
        function initDPISelector(){
            document.querySelectorAll('.dpi-btn').forEach(btn=>{
                btn.addEventListener('click',()=>{
                    document.querySelectorAll('.dpi-btn').forEach(b=>b.classList.remove('active'));
                    btn.classList.add('active');
                    currentDPI = parseInt(btn.dataset.dpi);
                    showToast(`DPI设为${currentDPI}`);
                });
            });
        }
        
        document.addEventListener('DOMContentLoaded',()=>{
            initDPISelector();
            window.handleFileUpload = handleFileUpload;
            window.openGallery = openGallery;
            window.closeGallery = closeGallery;
            window.sortGalleryByFileName = sortGalleryByFileName;
            window.exportPDF = exportPDF;
            window.capture = capture;
        });
    </script>
</body>
</html>
